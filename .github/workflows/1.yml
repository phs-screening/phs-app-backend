name: PR CI

# Trigger:
# - Runs on every non-draft pull request when opened, updated, reopened,
#   or marked ready for review.
# - Purpose: verify the backend before a PR is merged.

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  lint:
    if: github.event.pull_request.draft == false
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22'
          cache: npm

      - name: 3. Install Dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: 4. Lint
        run: npm run lint

  unit-tests:
    if: github.event.pull_request.draft == false
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22'
          cache: npm

      - name: 3. Install Dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: 4. Unit Tests
        run: npm run test:ci

  typecheck:
    if: github.event.pull_request.draft == false
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22'
          cache: npm

      - name: 3. Install Dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: 4. Type Check
        run: npm run typecheck
